<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro AIReview - Datos de Usuario</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #1a4d8c;
            --accent-gold: #f2a900;
            --white: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .register-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px;
            width: 100%;
            max-width: 450px;
            border-radius: 25px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            color: var(--white);
            text-align: center;
        }

        .logo-area {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        h2 {
            font-weight: 600;
            margin-bottom: 5px;
        }

        p {
            font-size: 0.85rem;
            margin-bottom: 25px;
            opacity: 0.8;
        }

        form {
            text-align: left;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            font-size: 0.8rem;
            margin-bottom: 6px;
            margin-left: 4px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border-radius: 12px;
            border: none;
            background: rgba(255, 255, 255, 0.95);
            font-size: 0.95rem;
            color: #333;
            outline: none;
            transition: 0.3s;
        }

        .input-group input:focus {
            box-shadow: 0 0 0 3px var(--accent-gold);
        }

        /* Contenedor para contraseñas en paralelo en desktop */
        .password-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            margin-top: 15px;
            border: none;
            border-radius: 12px;
            background-color: var(--accent-gold);
            color: #1a4d8c;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-submit:hover {
            background-color: #ffb700;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(242, 169, 0, 0.3);
        }

        .footer-link {
            margin-top: 20px;
            font-size: 0.85rem;
        }

        .footer-link a {
            color: var(--accent-gold);
            text-decoration: none;
            font-weight: 600;
        }

        /* Responsividad para móviles */
        @media (max-width: 400px) {
            .password-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="register-card">
        <div class="logo-area">🛂</div>
        <h2>Crear Cuenta</h2>
        <p>Regístrate y cuentanos sobre tu viaje</p>

        <form action="#">
            <div class="input-group">
                <label for="fullname">Nombre Completo</label>
                <input type="text" id="fullname" placeholder="Ej: Juan Pérez" required>
            </div>

            <div class="input-group">
                <label for="id-card">Cédula de Ciudadanía</label>
                <input type="number" id="id-card" placeholder="Número de documento" required>
            </div>

            <div class="input-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" placeholder="viajero@email.com" required>
            </div>

            <div class="password-row">
                <div class="input-group">
                    <label for="pass">Contraseña</label>
                    <input type="password" id="pass" placeholder="••••••••" required>
                </div>

                <div class="input-group">
                    <label for="confirm">Confirmar Contraseña</label>
                    <input type="password" id="confirm" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn-submit">Finalizar Registro</button>
        </form>

        <div class="footer-link">
            ¿Ya eres miembro? <a href="#">Inicia sesión</a>
        </div>
    </div>

</body>
</html>
