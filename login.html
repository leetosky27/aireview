<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AIReview</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f1724;
            --card: rgba(11, 18, 32, 0.8);
            --accent: #06b6d4;
            --muted: #94a3b8;
            --white: #e6eef6;
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(180deg, #061025 0%, #07121b 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: var(--white);
        }

        /* Nubes Minimalistas */
        .cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 50px;
            z-index: 0;
            width: 150px;
            height: 45px;
        }
        .cloud::before, .cloud::after {
            content: ''; position: absolute; background: inherit; border-radius: 50%;
        }
        .cloud::before { width: 60px; height: 60px; top: -30px; left: 25px; }
        .cloud::after { width: 80px; height: 80px; top: -45px; right: 20px; }

        .cloud-1 { top: 15%; right: 10%; transform: scale(1.2); }
        .cloud-2 { bottom: 20%; left: 8%; transform: scale(0.8); }
        .cloud-3 { top: 40%; left: -20px; opacity: 0.3; transform: scale(0.6); }

        .login-card {
            position: relative;
            z-index: 1;
            background: var(--card);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            text-align: center;
        }

        .login-card h1 {
            color: var(--white);
            font-weight: 600;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .login-card p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
            margin-bottom: 25px;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .input-group label {
            display: block;
            color: var(--white);
            font-size: 0.85rem;
            margin-bottom: 5px;
            color: var(--muted);
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            background: #1e293b;
            color: white;
            outline: none;
            font-size: 1rem;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: var(--accent);
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(180deg, var(--accent), #0891b2);
            color: #001;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
            margin-top: 10px;
            box-shadow: 0 6px 18px rgba(6, 38, 44, 0.25);
        }

        .btn-login:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .options {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
        }

        .options a {
            color: var(--white);
            text-decoration: none;
            opacity: 0.7;
        }
        .logo-icon {
            font-size: 40px;
            margin-bottom: 10px;
            display: inline-block;
        }
        .options a:hover {
            opacity: 1;
            color: var(--accent);
        }

    </style>
</head>
<body>
    <div class="cloud cloud-1"></div>
    <div class="cloud cloud-2"></div>
    <div class="cloud cloud-3"></div>

    <div class="login-card">
        <div class="logo-icon">✈️</div>
        <h1>AIReview</h1>
        <p>Inicia sesión para calificar tu vuelo</p>

        <form action="index.html">
            <div class="input-group">
                <label for="user">Correo o Usuario</label>
                <input type="text" id="user" placeholder="ejemplo@sky.com" required>
            </div>

            <div class="input-group">
                <label for="pass">Contraseña</label>
                <input type="password" id="pass" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-login">DESPEGAR</button>

            <div class="options">
                <a href="reset.html">¿Olvidaste tu clave?</a>
                <a href="register.html">Registrarme</a>
            </div>
        </form>
    </div>

</body>
</html>
