<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AIreview</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* Variables de color estilo aeronáutico */
        :root {
            --primary-blue: #1a4d8c;
            --accent-gold: #f2a900;
            --white: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            /* Fondo con degradado que simula el cielo al atardecer */
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Decoración de fondo (Nubes/Círculos) */
        .bg-circle {
            position: absolute;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            z-index: 0;
        }

        .login-card {
            position: relative;
            z-index: 1;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            text-align: center;
        }

        .login-card h1 {
            color: var(--white);
            font-weight: 600;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .login-card p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            color: var(--white);
            font-size: 0.85rem;
            margin-bottom: 5px;
            margin-left: 5px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border-radius: 10px;
            border: none;
            background: rgba(255, 255, 255, 0.9);
            outline: none;
            font-size: 1rem;
            transition: 0.3s;
        }

        .input-group input:focus {
            box-shadow: 0 0 0 3px var(--accent-gold);
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background-color: var(--accent-gold);
            color: #333;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
            margin-top: 10px;
        }

        .btn-login:hover {
            background-color: #e09b00;
            transform: translateY(-2px);
        }

        .options {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
        }

        .options a {
            color: var(--white);
            text-decoration: none;
            opacity: 0.7;
        }

        .options a:hover {
            opacity: 1;
            text-decoration: underline;
        }

        /* Icono de avión decorativo */
        .logo-icon {
            font-size: 40px;
            margin-bottom: 10px;
            display: inline-block;
        }

    </style>
</head>
<body>

    <div class="bg-circle" style="width: 300px; height: 300px; top: -100px; right: -50px;"></div>
    <div class="bg-circle" style="width: 200px; height: 200px; bottom: -50px; left: -50px;"></div>

    <div class="login-card">
        <div class="logo-icon">✈️</div>
        <h1>AirReview</h1>
        <p>Inicia sesión para calificar tu vuelo</p>

        <form action="#">
            <div class="input-group">
                <label for="user">Correo o Usuario</label>
                <input type="text" id="user" placeholder="ejemplo@sky.com" required>
            </div>

            <div class="input-group">
                <label for="pass">Contraseña</label>
                <input type="password" id="pass" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-login">DESPEGAR</button>

            <div class="options">
                <a href="#">¿Olvidaste tu clave?</a>
                <a href="#">Registrarme</a>
            </div>
        </form>
    </div>

</body>
</html>
