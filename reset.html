<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña - AIReview</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f1724;
            --card: rgba(11, 18, 32, 0.8);
            --accent: #06b6d4;
            --muted: #94a3b8;
            --white: #e6eef6;
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body {
            background: linear-gradient(180deg, #061025 0%, #07121b 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: var(--white);
        }
        .cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 50px;
            z-index: 0;
            width: 150px;
            height: 45px;
        }
        .cloud::before, .cloud::after {
            content: ''; position: absolute; background: inherit; border-radius: 50%;
        }
        .cloud::before { width: 60px; height: 60px; top: -30px; left: 25px; }
        .cloud::after { width: 80px; height: 80px; top: -45px; right: 20px; }

        .cloud-1 { top: 20%; right: 20%; transform: scale(1.3); }
        .cloud-2 { top: 70%; left: 15%; transform: scale(0.7); opacity: 0.5; }

        .login-card {
            position: relative;
            z-index: 1;
            background: var(--card);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 30px;
            width: 100%;
            max-width: 400px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            text-align: center;
        }
        .login-card h1 {
            color: var(--white);
            font-weight: 600;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }
        .login-card p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
            margin-bottom: 20px;
        }
        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }
        .input-group label {
            display: block;
            color: var(--white);
            font-size: 0.85rem;
            margin-bottom: 5px;
            color: var(--muted);
        }
        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            background: #1e293b;
            color: white;
            outline: none;
            font-size: 1rem;
            transition: 0.3s;
        }
        .input-group input:focus { border-color: var(--accent); }
        .btn-login {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(180deg, var(--accent), #0891b2);
            color: #001;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
            margin-top: 10px;
            box-shadow: 0 6px 18px rgba(6, 38, 44, 0.25);
        }
        .btn-login:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .options { margin-top: 20px; display: flex; justify-content: center; font-size: 0.8rem; }
        .options a { color: var(--white); text-decoration: none; opacity: 0.7; }
        .options a:hover { opacity: 1; text-decoration: underline; color: var(--accent); }
        .logo-icon { font-size: 40px; margin-bottom: 10px; display: inline-block; }
    </style>
</head>
<body>
    <div class="cloud cloud-1"></div>
    <div class="cloud cloud-2"></div>

    <div class="login-card">
        <div class="logo-icon">🛬</div>
        <h1>Recuperar Cuenta</h1>
        <p>Ingresa tu correo para recibir instrucciones de vuelo</p>
        <form action="login.html">
            <div class="input-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" placeholder="ejemplo@sky.com" required>
            </div>
            <button type="submit" class="btn-login">ENVIAR INSTRUCCIONES</button>
            <div class="options">
                <a href="login.html">Volver al inicio de sesión</a>
            </div>
        </form>
    </div>
</body>
</html>
